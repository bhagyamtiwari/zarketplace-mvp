    <link rel="canonical" href="https://zarketplace.com/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="zarketplace" />
    <meta property="og:title" content="zarketplace - secondhand fashion resale buy and sell" />
    <meta property="og:description" content="India's marketplace for buying and selling pre-owned fashion. Verified listings, secure payments, and tracked shipping." />
    <meta property="og:url" content="https://zarketplace.com/" />
    <meta property="og:image" content="https://zarketplace.com/images/wordmark-modified.png" />

    <meta name="twitter:card" content="summary" />

    <link rel="icon" type="image/png" href="/images/wordmark-modified.png">

    <!-- Fonts loaded directly in <head> (not via CSS @import) so the browser
         starts fetching them immediately, in parallel with everything else,
         instead of waiting for JS to inject the stylesheet. Minimizes the
         visible font-swap reflow on first load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <!-- Critical inline styles so the page never paints as unstyled HTML
         while the rest of the stylesheet loads. -->
    <style>
      html, body { margin: 0; background: #fff; }
      html { scrollbar-gutter: stable; }
      body { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

  </body>
